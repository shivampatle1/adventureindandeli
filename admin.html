<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Systematic Admin — Adventure in Dandeli</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --clr-bg-dark: #05080a;
            --clr-bg-layer: #0a1115;
            --clr-green-accent: #6EAF6E;
            --clr-text-main: #f8f9fa;
            --clr-text-muted: rgba(255,255,255,0.4);
            --glass-border: rgba(255,255,255,0.08);
            --glass-bg: rgba(255,255,255,0.03);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--clr-bg-dark);
            color: var(--clr-text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── LOGIN SCREEN ── */
        #login-screen {
            position: fixed; inset: 0; background: var(--clr-bg-dark); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--clr-bg-layer); border: 1px solid var(--glass-border);
            padding: 4rem; border-radius: var(--radius-lg); width: 100%; max-width: 440px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .login-card h2 { font-family: 'Outfit'; font-weight: 900; margin-bottom: 2rem; color: var(--clr-green-accent); font-size: 2rem; }
        .login-card label { text-align: left; margin-top: 1rem; }
        .password-group { position: relative; width: 100%; margin-top: 1rem; }
        .pass-eye { position: absolute; right: 1.2rem; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .pass-eye:hover { opacity: 1; color: var(--clr-green-accent); }

        /* ── SYSTEM LAYOUT ── */
        #admin-dashboard { display: none; }
        .sidebar {
            width: 320px; height: 100vh; position: fixed; left: 0; top: 0;
            background: var(--clr-bg-layer); border-right: 1px solid var(--glass-border);
            padding: 4rem 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; z-index: 100;
        }
        .sidebar h1 { font-family: 'Outfit'; font-weight: 900; color: var(--clr-green-accent); margin-bottom: 3rem; line-height: 1; font-size: 1.8rem; }
        
        .nav-btn {
            background: transparent; color: var(--clr-text-muted); border: none; padding: 1.2rem 1.8rem; border-radius: var(--radius-md);
            text-align: left; cursor: pointer; display: flex; align-items: center; gap: 1.2rem; transition: 0.4s; font-weight: 600; font-size: 0.95rem;
        }
        .nav-btn i { font-size: 1.2rem; width: 24px; }
        .nav-btn:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-btn.active { background: rgba(110,175,110,0.1); color: var(--clr-green-accent); border: 1px solid rgba(110,175,110,0.2); }

        .main-stage { margin-left: 320px; padding: 5rem; min-height: 100vh; background: radial-gradient(circle at top right, rgba(110,175,110,0.03), transparent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.5s ease both; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ── PREMIUM CARDS & FORMS ── */
        .glass-card {
            background: var(--clr-bg-layer); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 4rem;
            box-shadow: 0 40px 120px rgba(0,0,0,0.4);
        }
        .glass-card h2 { font-family: 'Outfit'; margin-bottom: 3rem; font-size: 2.2rem; }
        
        form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2.5rem; }
        .span-full { grid-column: span 2; }
        
        .field-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .field-group label { color: var(--clr-text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
        
        input, select {
            background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 1.4rem; color: white;
            border-radius: var(--radius-md); font-family: inherit; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--clr-green-accent); outline: none; background: rgba(255,255,255,0.05); }

        /* Image Matrix with FIXED SIZE */
        .image-matrix { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; }
        .img-cell {
            position: relative; aspect-ratio: 1/1; background: #000; border-radius: var(--radius-md); 
            border: 2px dashed var(--glass-border); overflow: hidden; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .img-cell:hover { border-color: var(--clr-green-accent); background: rgba(110,175,110,0.05); }
        .img-cell i { font-size: 1.5rem; color: var(--clr-text-muted); }
        .img-cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 2; }
        .img-cell input { display: none; }
        .img-cell .slot-num { position: absolute; top: 0.8rem; left: 0.8rem; font-size: 0.65rem; font-weight: 900; color: var(--clr-green-accent); z-index: 10; opacity: 0.6; }

        /* Modern Chip Amenities */
        .amenity-wrap { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1rem; }
        .chip { cursor: pointer; position: relative; }
        .chip input { display: none; }
        .chip span {
            display: inline-block; padding: 0.8rem 1.4rem; border-radius: 50px; border: 1px solid var(--glass-border);
            font-size: 0.85rem; font-weight: 600; color: var(--clr-text-muted); transition: 0.3s; background: rgba(255,255,255,0.02);
        }
        .chip input:checked + span {
            background: rgba(110,175,110,0.1); color: var(--clr-green-accent); border-color: var(--clr-green-accent);
            box-shadow: 0 0 15px rgba(110,175,110,0.2);
        }
        .add-chip-btn {
            background: transparent; color: var(--clr-green-accent); border: 1px dashed var(--clr-green-accent);
            padding: 0.8rem 1.4rem; border-radius: 50px; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .add-chip-btn:hover { background: var(--clr-green-accent); color: black; }

        /* Action Buttons */
        .primary-btn {
            background: var(--clr-green-accent); color: black; font-weight: 800; border: none; padding: 1.5rem 4rem;
            border-radius: 50px; font-family: 'Outfit'; font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 40px rgba(110,175,110,0.2);
        }
        .primary-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 50px rgba(110,175,110,0.4); }
        .primary-btn:disabled { opacity: 0.5; cursor: wait; }

        /* Listings List */
        .listing-row {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            padding: 1.8rem 3rem; margin-bottom: 1.2rem; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .listing-row:hover { border-color: rgba(255,255,255,0.15); transform: translateX(10px); }
        .listing-info strong { font-family: 'Outfit'; font-size: 1.3rem; color: var(--clr-green-accent); }
        .listing-info p { color: var(--clr-text-muted); font-size: 0.85rem; margin-top: 0.3rem; }
        
        .row-actions { display: flex; gap: 1.5rem; }
        .row-actions i { font-size: 1.3rem; cursor: pointer; transition: 0.3s; opacity: 0.6; }
        .row-actions i:hover { opacity: 1; }
        .col-edit { color: #818cf8; }
        .col-delete { color: #f87171; }

        /* ── LEAD CARD ── */
        .lead-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            padding: 2rem; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1.5rem; transition: 0.3s;
        }
        .lead-card:hover { border-color: rgba(110,175,110,0.3); background: rgba(255,255,255,0.03); transform: scale(1.01); }
        .lead-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .lead-user-info h3 { font-family: 'Outfit'; font-size: 1.6rem; color: var(--clr-green-accent); margin-bottom: 0.3rem; }
        .lead-user-info span { font-size: 0.8rem; color: var(--clr-text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
        .lead-badge { background: rgba(110,175,110,0.1); border: 1px solid rgba(110,175,110,0.2); padding: 0.5rem 1.2rem; border-radius: 50px; color: var(--clr-green-accent); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.05em; }
        .lead-details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; padding: 1.2rem; background: rgba(0,0,0,0.3); border-radius: var(--radius-md); }
        .lead-item { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; color: white; transition: 0.2s; }
        .lead-item:hover { color: var(--clr-green-accent); }
        .lead-item i { width: 1.2rem; color: var(--clr-green-accent); font-size: 1.1rem; }
        .lead-message { padding: 1.2rem; background: rgba(255,255,255,0.03); border-radius: 12px; border-left: 3px solid var(--clr-green-accent); font-style: italic; line-height: 1.6; color: rgba(255,255,255,0.8); font-size: 0.9rem; }

        #enquiry-stream {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        @media (max-width: 1400px) {
            #enquiry-stream { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 900px) {
            #enquiry-stream { grid-template-columns: 1fr; }
        }

        #upload-status {
            background: rgba(110,175,110,0.1); color: var(--clr-green-accent); padding: 1.5rem;
            border-radius: var(--radius-md); margin-bottom: 2rem; font-weight: 700; display: none; text-align: center;
        }

        /* ── CUSTOM POPUP ── */
        .popup-overlay {
            display: none; position: fixed; inset: 0; background: rgba(5,10,14,0.9);
            z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .popup-card {
            background: var(--clr-bg-layer); border: 1px solid var(--glass-border); padding: 3rem;
            border-radius: var(--radius-lg); width: 100%; max-width: 440px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); animation: popScale 0.3s ease both;
        }
        @keyframes popScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .popup-icon { font-size: 3.5rem; margin-bottom: 1.5rem; }
        .popup-icon.success { color: var(--clr-green-accent); }
        .popup-icon.error { color: #f87171; }
        .popup-icon.info { color: #818cf8; }
        .popup-card h2 { font-family: 'Outfit'; margin-bottom: 0.8rem; font-size: 1.6rem; }
        .popup-card p { color: var(--clr-text-muted); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.6; }

        /* ── MOBILE RESPONSIVENESS OVERRIDES ── */
        @media (max-width: 768px) {
            body { padding-bottom: 85px; } /* Space for bottom nav */
            
            /* Login Screen */
            .login-card { padding: 3rem 1.5rem; width: 90%; }
            .login-card h2 { font-size: 1.6rem; }
            
            /* Sidebar -> Bottom App Bar */
            .sidebar {
                width: 100%; height: 75px; top: auto; bottom: 0;
                flex-direction: row; padding: 0 1rem; align-items: center; justify-content: space-between;
                border-right: none; border-top: 1px solid var(--glass-border);
                background: rgba(10, 17, 21, 0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
                z-index: 1000;
            }
            .sidebar h1 { display: none; }
            
            /* Navigation Buttons Mobile Tuning */
            .nav-btn {
                flex: 1; flex-direction: column; gap: 0.4rem; padding: 0.5rem !important;
                justify-content: center; border-radius: var(--radius-lg);
                font-size: 0 !important; /* Hide long text strings for clean icon layout */
                border: none !important; margin: 0;
            }
            .nav-btn i { font-size: 1.4rem !important; }
            .nav-btn.active { background: transparent !important; color: var(--clr-green-accent); transform: scale(1.1); text-shadow: 0 0 15px rgba(110,175,110,0.4); }
            
            /* Sidebar Sign-out div wrapper removal */
            .sidebar > div { margin-top: 0 !important; border-top: none !important; padding-top: 0 !important; flex: 1; display: flex; }
            .sidebar > div button { width: 100% !important; border: none !important; }

            /* Main Layout Area */
            .main-stage { margin-left: 0; padding: 2rem 1.5rem 5rem 1.5rem; }
            
            /* Glass Cards & Sections */
            .glass-card { padding: 2rem 1.5rem; border-radius: var(--radius-md); }
            .glass-card h2 { font-size: 1.6rem; margin-bottom: 2rem; }
            
            /* Forms */
            form { grid-template-columns: 1fr; gap: 1.5rem; }
            .span-full { grid-column: span 1; }
            
            /* Image Matrix */
            .image-matrix { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
            
            /* UI Elements & Chips */
            .primary-btn { padding: 1.2rem; width: 100%; display: block; text-align: center; }
            .chip span { font-size: 0.75rem; padding: 0.6rem 1rem; }
            
            /* Listings Content Stacking */
            .listing-row { flex-direction: column; padding: 1.5rem; align-items: flex-start; gap: 1rem; }
            .row-actions { width: 100%; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); }
            
            /* Leads Formatting */
            .lead-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .lead-details-grid { grid-template-columns: 1fr; }
            
            /* Popups */
            .popup-card { padding: 2.5rem 1.5rem; width: 92%; }
        }
    </style>
</head>
<body>

    <!-- ── LOGIN ── -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Admin Master</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" class="span-full" required>
                <div class="password-group span-full">
                    <input type="password" id="login-password" value="dandeli@2026admin" required style="width: 100%;">
                    <i class="fa-solid fa-eye pass-eye" onclick="togglePass()"></i>
                </div>
                <button type="submit" class="primary-btn span-full" style="width: 100%;">AUTHORIZE ACCESS</button>
            </form>
            <p id="login-err" style="color:#f87171; margin-top:1.5rem; display:none; font-size:0.9rem;">Access Denied. Check credentials.</p>
        </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="admin-dashboard">
        <div class="sidebar">
            <h1>Dandeli<br>Portal</h1>
            <button class="nav-btn active" id="nav-add" onclick="switchStage('add-stage', this)">
                <i class="fa-solid fa-plus-circle"></i> Create Property
            </button>
            <button class="nav-btn" id="nav-list" onclick="switchStage('list-stage', this)">
                <i class="fa-solid fa-layer-group"></i> Active Listings
            </button>
            <button class="nav-btn" id="nav-leads" onclick="switchStage('leads-stage', this)">
                <i class="fa-solid fa-envelope-open-text"></i> Guest Enquiries
            </button>
            
            <div style="margin-top: auto; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
                <button class="nav-btn" onclick="logout()" style="color: #f87171; width: 100%;">
                    <i class="fa-solid fa-power-off"></i> Sign Out
                </button>
            </div>
        </div>

        <div class="main-stage">
            <!-- STAGE: ADD/EDIT -->
            <div id="add-stage" class="tab-content active">
                <div class="glass-card">
                    <h2 id="stage-title">Configure Property</h2>
                    <div id="upload-status">SYNCING WITH CLOUD DATA...</div>
                    
                    <form id="property-form">
                        <input type="hidden" id="edit-doc-id">
                        
                        <div class="field-group span-full">
                            <label>Property Name</label>
                            <input type="text" id="prop-name" placeholder="e.g. Royal Safari Den" required>
                        </div>
                        
                        <div class="field-group">
                            <label>Rating (1.0 - 5.0)</label>
                            <input type="number" step="0.1" id="prop-rating" value="4.8">
                        </div>
                        <div class="field-group">
                            <label>Total Reviews</label>
                            <input type="number" id="prop-reviews" value="150">
                        </div>

                        <div class="field-group span-full">
                            <label>Image Matrix (5 Slots Locked — Zero Shift)</label>
                            <div class="image-matrix">
                                <!-- SLOT 1 -->
                                <label for="file-1" class="img-cell" id="cell-1">
                                    <span class="slot-num">01</span>
                                    <i class="fa-solid fa-plus"></i>
                                    <img id="prev-1">
                                    <input type="file" id="file-1" onchange="handlePreview(1)" accept="image/*">
                                    <input type="hidden" id="raw-str-1">
                                </label>
                                <!-- SLOT 2 -->
                                <label for="file-2" class="img-cell" id="cell-2">
                                    <span class="slot-num">02</span>
                                    <i class="fa-solid fa-plus"></i>
                                    <img id="prev-2">
                                    <input type="file" id="file-2" onchange="handlePreview(2)" accept="image/*">
                                    <input type="hidden" id="raw-str-2">
                                </label>
                                <!-- SLOT 3 -->
                                <label for="file-3" class="img-cell" id="cell-3">
                                    <span class="slot-num">03</span>
                                    <i class="fa-solid fa-plus"></i>
                                    <img id="prev-3">
                                    <input type="file" id="file-3" onchange="handlePreview(3)" accept="image/*">
                                    <input type="hidden" id="raw-str-3">
                                </label>
                                <!-- SLOT 4 -->
                                <label for="file-4" class="img-cell" id="cell-4">
                                    <span class="slot-num">04</span>
                                    <i class="fa-solid fa-plus"></i>
                                    <img id="prev-4">
                                    <input type="file" id="file-4" onchange="handlePreview(4)" accept="image/*">
                                    <input type="hidden" id="raw-str-4">
                                </label>
                                <!-- SLOT 5 -->
                                <label for="file-5" class="img-cell" id="cell-5">
                                    <span class="slot-num">05</span>
                                    <i class="fa-solid fa-plus"></i>
                                    <img id="prev-5">
                                    <input type="file" id="file-5" onchange="handlePreview(5)" accept="image/*">
                                    <input type="hidden" id="raw-str-5">
                                </label>
                            </div>
                        </div>

                        <div class="field-group span-full">
                            <label>Amenities Chips</label>
                            <div class="amenity-wrap" id="amenity-pool">
                                <!-- JS Populated -->
                            </div>
                            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                                <input type="text" id="new-amenity-input" placeholder="New Feature..." style="padding: 0.8rem 1.4rem; font-size: 0.85rem; width: 220px;">
                                <button type="button" class="add-chip-btn" onclick="addNewChip()">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </div>

                        <div class="field-group span-full" style="margin-top: 2rem;">
                            <button type="submit" id="save-btn" class="primary-btn">GENERATE PROPERTY</button>
                            <button type="button" onclick="syncDefaults()" style="margin-left: 2rem; background: transparent; color: var(--clr-text-muted); border: 1px solid var(--glass-border); padding: 1.2rem 2.5rem; border-radius: 50px; cursor: pointer; font-family: 'Outfit'; font-weight: 700;">SYNC 17 DEFAULTS</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- STAGE: LISTINGS -->
            <div id="list-stage" class="tab-content">
                <h2 style="font-family:'Outfit'; margin-bottom: 3rem; font-size: 2.2rem;">Live Portal Listings</h2>
                <div id="listing-stream">
                    <!-- Dynamic Stream -->
                </div>
            </div>

            <!-- STAGE: ENQUIRIES -->
            <div id="leads-stage" class="tab-content">
                <h2 style="font-family:'Outfit'; margin-bottom: 3rem; font-size: 2.2rem;">Recent Guest Leads</h2>
                <div id="enquiry-stream">
                    <!-- Leads will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- ── CUSTOM POPUP STRUCTURE ── -->
    <div class="popup-overlay" id="status-popup">
        <div class="popup-card">
            <div id="pop-icon-box" class="popup-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h2 id="pop-title">Success</h2>
            <p id="pop-msg">Operation completed successfully.</p>
            <div id="pop-actions" style="display:flex; gap:1rem;">
                <button id="pop-cancel" class="nav-btn" style="flex:1; justify-content:center; display:none;" onclick="closePopup()">CANCEL</button>
                <button id="pop-confirm" class="primary-btn" style="flex:1; padding: 1.2rem;" onclick="closePopup()">OK</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_3g3EqqnvOqZyG0ienk7hwbUcqqpYzhQ",
            authDomain: "adventureindandeli-a5585.firebaseapp.com",
            projectId: "adventureindandeli-a5585",
            storageBucket: "adventureindandeli-a5585.firebasestorage.app",
            messagingSenderId: "139892128859",
            appId: "1:139892128859:web:882fccdcc8e5e0f46bd37e",
            measurementId: "G-KX694VYT0W"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // AMENITIES INIT
        let masterAmenities = ['WiFi', 'AC', 'River View', 'Nature View', 'Bonfire', 'Breakfast', 'Private Deck', 'Sunrise View', 'Luxury Bath', 'Kitchenette', 'Garden View', 'King Bed'];
        
        function renderChips() {
            const pool = document.getElementById('amenity-pool');
            pool.innerHTML = '';
            masterAmenities.forEach(a => {
                pool.innerHTML += `
                    <label class="chip">
                        <input type="checkbox" value="${a}" class="amen-check">
                        <span>${a}</span>
                    </label>
                `;
            });
        }
        renderChips();

        // ── CUSTOM POPUP LOGIC (UPGRADED) ──
        window.showPopup = (title, msg, type = 'success', onConfirm = null) => {
            const popup = document.getElementById('status-popup');
            const iconBox = document.getElementById('pop-icon-box');
            const titleEl = document.getElementById('pop-title');
            const msgEl = document.getElementById('pop-msg');
            const confirmBtn = document.getElementById('pop-confirm');
            const cancelBtn = document.getElementById('pop-cancel');

            // Reset UI
            confirmBtn.disabled = false;
            confirmBtn.innerHTML = "OK";
            iconBox.className = `popup-icon ${type}`;
            if(type === 'success') iconBox.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
            else if(type === 'error') iconBox.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
            else if(type === 'info') iconBox.innerHTML = '<i class="fa-solid fa-circle-question"></i>';
            else if(type === 'loading') iconBox.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            
            titleEl.innerText = title;
            msgEl.innerText = msg;
            
            // Handle Actions
            if(type === 'loading') {
                confirmBtn.style.display = 'none';
                cancelBtn.style.display = 'none';
            } else {
                confirmBtn.style.display = 'block';
                confirmBtn.innerText = onConfirm ? "CONFIRM" : "DISMISS";
                cancelBtn.style.display = onConfirm ? "flex" : "none";
                
                confirmBtn.onclick = async () => {
                    if(onConfirm) {
                        try {
                            confirmBtn.disabled = true;
                            confirmBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                            await onConfirm();
                            // If onConfirm didn't trigger another popup, close this one
                            if (titleEl.innerText === title) {
                                closePopup();
                            }
                        } catch (err) {
                            showPopup("Sync Error", err.message, "error");
                        }
                    } else {
                        closePopup();
                    }
                };
            }

            popup.style.display = 'flex';
        };
        window.closePopup = () => {
            const popup = document.getElementById('status-popup');
            popup.style.display = 'none';
            const confirmBtn = document.getElementById('pop-confirm');
            confirmBtn.disabled = false;
        };

        window.addNewChip = () => {
            const input = document.getElementById('new-amenity-input');
            const val = input.value.trim();
            if(val && !masterAmenities.includes(val)) {
                masterAmenities.push(val);
                renderChips();
                input.value = '';
            }
        };

        // UI HELPERS
        window.switchStage = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) btn.classList.add('active');
            if(id === 'add-stage' && !document.getElementById('edit-doc-id').value) {
                document.getElementById('stage-title').innerText = "Configure Property";
                document.getElementById('save-btn').innerText = "GENERATE PROPERTY";
            }
        };

        window.togglePass = () => {
            const p = document.getElementById('login-password');
            p.type = (p.type === 'password' ? 'text' : 'password');
        };

        window.handlePreview = (i) => {
            const file = document.getElementById(`file-${i}`).files[0];
            const img = document.getElementById(`prev-${i}`);
            const cell = document.getElementById(`cell-${i}`);
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    cell.style.borderStyle = 'solid';
                    cell.style.borderColor = 'var(--clr-green-accent)';
                };
                reader.readAsDataURL(file);
            }
        };

        // AUTH ENGINE
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const em = document.getElementById('login-email').value;
            const ps = document.getElementById('login-password').value;
            try { 
                showPopup("Authorizing", "Authenticating with Cloud security...", "loading");
                await signInWithEmailAndPassword(auth, em, ps); 
                closePopup();
            } 
            catch (err) { 
                showPopup("Access Denied", "Check your credentials and try again.", "error");
            }
        };
        window.autoReg = async (e,p) => { try { await createUserWithEmailAndPassword(auth,e,p); showPopup('Master Registered!', 'Account created in Cloud database.', 'success'); } catch(err) { showPopup('Identity Error', err.message, 'error'); } };
        onAuthStateChanged(auth, u => {
            document.getElementById('login-screen').style.display = u ? 'none' : 'flex';
            document.getElementById('admin-dashboard').style.display = u ? 'block' : 'none';
        });
        window.logout = () => signOut(auth);

        // COMPRESSION ENGINE
        const compressImg = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        try {
                            const max = 800;
                            let w = img.width, h = img.height;
                            if(w > h) { if(w > max) { h *= max/w; w = max; } }
                            else { if(h > max) { w *= max/h; h = max; } }
                            const canvas = document.createElement('canvas');
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        } catch(err) {
                            console.error("Compression failed:", err);
                            resolve('assets/resort/resort.jpeg'); // Fallback on canvas error
                        }
                    };
                    img.onerror = () => resolve('assets/resort/resort.jpeg'); // Fallback on load error (e.g., HEIC)
                };
                reader.onerror = () => resolve('assets/resort/resort.jpeg'); // Fallback on read error
            });
        };

        // DATA FLOW
        const form = document.getElementById('property-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const docId = document.getElementById('edit-doc-id').value;
            const btn = document.getElementById('save-btn');
            
            btn.disabled = true;
            showPopup("Syncing", "Uploading property data to the cloud matrix...", "loading");

            try {
                const images = [];
                for(let i=1; i<=5; i++) {
                    const file = document.getElementById(`file-${i}`).files[0];
                    const existing = document.getElementById(`raw-str-${i}`).value;
                    if(file) images.push(await compressImg(file));
                    else if(existing) images.push(existing);
                    else images.push('assets/resort/resort.jpeg');
                }

                const data = {
                    name: document.getElementById('prop-name').value,
                    rating: document.getElementById('prop-rating').value,
                    reviews: document.getElementById('prop-reviews').value,
                    images: images,
                    amenities: Array.from(document.querySelectorAll('.amen-check:checked')).map(el => el.value)
                };

                if(docId) await updateDoc(doc(db, "resort_rooms", docId), data);
                else await addDoc(collection(db, "resort_rooms"), data);

                showPopup("System Updated", "Property details have been synchronized with the live portal.", "success");
                form.reset();
                [1,2,3,4,5].forEach(i => {
                    document.getElementById(`prev-${i}`).style.display = 'none';
                    document.getElementById(`cell-${i}`).style.borderStyle = 'dashed';
                    document.getElementById(`cell-${i}`).style.borderColor = 'var(--glass-border)';
                    document.getElementById(`raw-str-${i}`).value = '';
                });
                document.getElementById('edit-doc-id').value = '';
                switchStage('list-stage', document.getElementById('nav-list'));
            } catch (err) {
                showPopup("Cloud Error", err.message, "error");
            } finally {
                btn.disabled = false;
            }
        };

        // STREAM SUBSCRIPTION
        onSnapshot(collection(db, "resort_rooms"), snap => {
            const stream = document.getElementById('listing-stream');
            if(!stream) return;
            stream.innerHTML = '';
            snap.forEach(d => {
                const r = d.data();
                const div = document.createElement('div');
                div.className = 'listing-row';
                div.innerHTML = `
                    <div class="listing-info">
                        <strong>${r.name}</strong>
                        <p>${r.rating} ⭐ • ${r.reviews} Reviews • ${r.amenities.length} Perks</p>
                    </div>
                    <div class="row-actions">
                        <i class="fa-solid fa-pen-to-square col-edit"></i>
                        <i class="fa-solid fa-trash-can col-delete"></i>
                    </div>
                `;
                div.querySelector('.col-edit').onclick = () => {
                    document.getElementById('edit-doc-id').value = d.id;
                    document.getElementById('prop-name').value = r.name;
                    document.getElementById('prop-rating').value = r.rating;
                    document.getElementById('prop-reviews').value = r.reviews;
                    document.getElementById('stage-title').innerText = "Refine: " + r.name;
                    document.getElementById('save-btn').innerText = "UPDATE CLOUD DATA";
                    
                    r.images.forEach((img, i) => {
                        document.getElementById(`raw-str-${i+1}`).value = img;
                        if(img && img.startsWith('data:image')) {
                            document.getElementById(`prev-${i+1}`).src = img;
                            document.getElementById(`prev-${i+1}`).style.display = 'block';
                            document.getElementById(`cell-${i+1}`).style.borderStyle = 'solid';
                        }
                    });

                    // Ensure all listed amenities are in master list
                    r.amenities.forEach(a => { if(!masterAmenities.includes(a)) masterAmenities.push(a); });
                    renderChips();
                    document.querySelectorAll('.amen-check').forEach(chk => {
                        chk.checked = r.amenities.includes(chk.value);
                    });

                    switchStage('add-stage', document.getElementById('nav-add'));
                };
                div.querySelector('.col-delete').onclick = () => {
                    showPopup('Delete Property?', 'Permanently remove listing from Cloud.', 'info', async () => {
                        await deleteDoc(doc(db, "resort_rooms", d.id));
                        showPopup('Deleted Successfully', 'Property removed from database.', 'success');
                    });
                };
                stream.appendChild(div);
            });
        });

        // ── ENQUIRY STREAM (REAL-TIME) ──
        onSnapshot(collection(db, "room_enquiries"), snap => {
            const stream = document.getElementById('enquiry-stream');
            if(!stream) return;
            stream.innerHTML = '';
            snap.forEach(d => {
                const e = d.data();
                const div = document.createElement('div');
                div.className = 'lead-card';
                div.innerHTML = `
                    <div class="lead-header">
                        <div class="lead-user-info">
                            <h3>${e.customerName}</h3>
                            <span>Lead Received on ${new Date(e.timestamp?.seconds * 1000).toLocaleDateString()} at ${new Date(e.timestamp?.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="lead-badge">PROJECT: ${e.roomName}</div>
                    </div>
                    <div class="lead-details-grid">
                        <a href="tel:${e.customerPhone}" class="lead-item"><i class="fa-solid fa-phone"></i> ${e.customerPhone}</a>
                        <a href="mailto:${e.customerEmail}" class="lead-item"><i class="fa-solid fa-envelope"></i> ${e.customerEmail}</a>
                    </div>
                    <div class="lead-message">
                        "${e.message || 'No specific requests mentioned.'}"
                    </div>
                    <div style="display:flex; justify-content: flex-end; gap: 1.5rem;">
                         <button class="col-delete-lead" style="background:transparent; color:#f87171; border:none; cursor:pointer; font-size:1.1rem;"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                div.querySelector('.col-delete-lead').onclick = () => {
                    showPopup('Archive Guest Lead?', 'Do you want to permanently remove this inquiry from active leads?', 'info', async () => {
                         await deleteDoc(doc(db, "room_enquiries", d.id));
                         showPopup('Lead Archived', 'Inquiry removed and records updated.', 'success');
                    });
                };
                stream.appendChild(div);
            });
        });

        window.syncDefaults = async () => {
            const defaults = [{name:'Heritage Villa'},{name:'River Suite'},{name:'Jungle Cabin'}];
            showPopup('Sync Defaults?', 'Deploy 3 master slots to the database?', 'info', async () => {
                for(let item of defaults) {
                    await addDoc(collection(db, "resort_rooms"), { ...item, rating:4.9, reviews:80, images:['assets/resort/resort.jpeg'], amenities:['WiFi','AC'] });
                }
                showPopup('Sync Complete', '3 Master Slots have been deployed.', 'success');
            });
        };
    </script>
</body>
</html>
